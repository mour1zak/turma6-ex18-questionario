<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responder Questionário</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <header>
        <h1>📝 Responder Questionário</h1>
        <nav>
            <a href="../index.html">Início</a>
            <a href="formularios.html">Voltar</a>
        </nav>
    </header>

    <main>
        <div id="container-status"></div>

        <div id="container-formulario" style="display: none;">
            <h2 id="titulo-formulario"></h2>
            <p id="descricao-formulario"></p>
            
            <form id="form-resposta">
                <!-- CAMPOS DE DADOS DO RESPONDENTE (EXIGIDO PELO ENUNCIADO) -->
                <fieldset>
                    <legend>Dados do Respondente</legend>
                    
                    <label for="nome">Nome Completo:</label>
                    <input type="text" id="nome" name="nome" required minlength="2" placeholder="Digite seu nome">
                    
                    <label for="email">E-mail:</label>
                    <input type="email" id="email" name="email" required placeholder="seu@email.com">
                </fieldset>

                <!-- AS PERGUNTAS SERÃO INSERIDAS AQUI PELO JAVASCRIPT -->
                <fieldset id="container-perguntas">
                    <legend>Perguntas</legend>
                </fieldset>

                <button type="submit">Enviar Respostas</button>
            </form>
        </div>
    </main>

    <script src="../js/respostas/responder.js"></script>
</body> 
</html>
